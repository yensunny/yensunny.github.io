<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>YEN SUNNY | Graphic Designer</title>
  <meta name="description" content="Yen Sunny, Taiwan-born graphic designer based in Seoul. Graphic design, branding, packaging and photography portfolio.">
  <style>
    :root {
      --bg: #FF7500;
      --ink: #050505;
      --muted: #252525;
      --line: #050505;
      --gap: 12px;
      --nav-size: 19px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, "Apple SD Gothic Neo", "Noto Sans KR", "Noto Sans TC", sans-serif;
      font-size: 16px;
      line-height: 1.35;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { border: 0; background: none; color: inherit; font: inherit; cursor: pointer; padding: 0; }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
      padding: 9px var(--gap) 8px;
      background: rgba(255, 117, 0, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .name {
      font-size: var(--nav-size);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 900;
      white-space: nowrap;
      text-decoration: none;
    }
    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px 18px;
      font-size: var(--nav-size);
      font-weight: 900;
      text-transform: uppercase;
    }
    .nav button {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .nav button.is-active { text-decoration: none; color: var(--muted); }
    .lang { display: inline-flex; gap: 8px; margin-left: 2px; }
    .lang button { text-transform: uppercase; }

    main { flex: 1 0 auto; }
    .page { display: none; }
    .page.is-active { display: block; }

    .work-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      padding: var(--gap);
    }
    .work {
      position: relative;
      min-height: 340px;
      overflow: hidden;
      background: #e9e9e9;
      cursor: pointer;
      border: 1px solid var(--line);
    }
    .work.is-hidden { display: none; }
    .work.is-featured { grid-column: span 2; grid-row: span 2; min-height: 696px; }
    .work img {
      width: 100%;
      height: 100%;
      min-height: inherit;
      object-fit: cover;
    }
    .label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, .76);
      opacity: 0;
      transition: opacity .18s ease;
    }
    .work:hover .label,
    .work:focus-visible .label { opacity: 1; }
    .label strong {
      font-size: clamp(26px, 3.6vw, 48px);
      line-height: .92;
      letter-spacing: 0;
      font-weight: 900;
    }
    .label span { max-width: 260px; font-size: 14px; font-weight: 800; }

    .about-page {
      min-height: calc(100vh - 132px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      padding: 42px var(--gap) 80px;
    }
    .about-page h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 78px);
      line-height: .92;
      letter-spacing: -.07em;
      font-weight: 900;
    }
    .about-copy { max-width: 720px; }
    .about-copy p { margin: 0 0 20px; color: var(--muted); font-size: 18px; line-height: 1.58; }
    .facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      margin-top: 30px;
      background: var(--line);
      border: 1px solid var(--line);
    }
    .fact { background: var(--bg); padding: 14px; }
    .fact small { display: block; margin-bottom: 4px; color: var(--muted); font-size: 12px; }
    .fact strong { font-size: 19px; }

    .footer {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 92px;
      margin-top: auto;
      padding: 22px var(--gap);
      border-top: 1px solid var(--line);
      background: var(--bg);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: #fff;
      color: #000;
    }
    .viewer.is-open { display: grid; }
    .viewer-head,
    .viewer-foot {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .viewer-foot { grid-template-columns: auto 1fr auto; align-items: center; border-top: 1px solid var(--line); border-bottom: 0; }
    .viewer-title { font-size: clamp(28px, 5vw, 72px); line-height: .9; letter-spacing: -.06em; font-weight: 900; }
    .viewer-title small { display: block; margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.3; letter-spacing: 0; font-weight: 700; }
    .viewer button { font-size: 18px; font-weight: 900; text-decoration: underline; text-underline-offset: 3px; }
    .stage { min-height: 0; display: flex; align-items: center; justify-content: center; padding: 12px; }
    .stage img { width: auto; max-width: 100%; max-height: 100%; object-fit: contain; }
    .count { text-align: center; color: var(--muted); font-weight: 700; }

    @media (max-width: 900px) {
      .top { grid-template-columns: 1fr; align-items: start; }
      .nav { justify-content: flex-start; }
      .work-list { grid-template-columns: 1fr 1fr; }
      .work.is-featured { grid-column: span 2; }
      .about-page { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      :root { --nav-size: 16px; }
      .work-list { grid-template-columns: 1fr; }
      .work,
      .work.is-featured { grid-column: 1; min-height: 360px; }
      .facts { grid-template-columns: 1fr; }
      .footer { min-height: 118px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="name" href="#" data-reset>YEN SUNNY</a>
    <nav class="nav" aria-label="Portfolio navigation">
      <button class="filter" type="button" data-filter="graphic">Graphic Design</button>
      <button class="filter" type="button" data-filter="branding">Branding</button>
      <button class="filter" type="button" data-filter="package">Package</button>
      <button class="page-button" type="button" data-page="about">About</button>
      <span class="lang" aria-label="Language switcher">
        <button type="button" class="lang-button is-active" data-lang="zh">中</button>
        <button type="button" class="lang-button" data-lang="ko">KO</button>
        <button type="button" class="lang-button" data-lang="en">EN</button>
      </span>
    </nav>
  </header>

  <main id="top">
    <section class="page is-active" id="workPage">
      <div class="work-list" id="workList" aria-label="Selected work"></div>
    </section>

    <section class="page" id="aboutPage">
      <div class="about-page">
        <h1 data-i="about_title">作品先說話，說明放後面。</h1>
        <div class="about-copy">
          <p data-i="about_p1">你好，我是 Yen Sunny，來自台灣，目前在首爾工作的平面設計師。擅長品牌識別、包裝、海報、商品攝影與修圖，並能將視覺概念整理成可實際使用的設計成果。</p>
          <p data-i="about_p2">我有 13 年平面設計經驗，在台灣出生、於韓國工作。我的強項是用外國人的視角觀察韓國市場，同時保留設計在商業現場中可被理解、可被使用的清楚度。</p>
          <div class="facts">
            <div class="fact"><small data-i="fact_exp">資歷</small><strong data-i="fact_exp_value">13 年</strong></div>
            <div class="fact"><small data-i="fact_base">所在地</small><strong>Seoul, Korea</strong></div>
            <div class="fact"><small data-i="fact_from">來自</small><strong>Taiwan</strong></div>
            <div class="fact"><small data-i="fact_tools">工具</small><strong>Ai · Ps · Lr · Figma</strong></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div data-i="footer">© 2026 Yen Sunny. 作品圖片、網站製作與整理過程含 AI 輔助。</div>
  </footer>

  <div class="viewer" id="viewer" aria-hidden="true" role="dialog" aria-label="Project viewer">
    <div class="viewer-head"><div class="viewer-title" id="viewerTitle"></div><button type="button" id="closeViewer" data-i="viewer_close">關閉</button></div>
    <div class="stage"><img id="viewerImage" alt=""></div>
    <div class="viewer-foot"><button type="button" id="prevImage" data-i="viewer_prev">上一張</button><div class="count" id="imageCount"></div><button type="button" id="nextImage" data-i="viewer_next">下一張</button></div>
  </div>

  <script>
    const works = [
      {
        title: "Pizza 39",
        categories: ["branding", "package", "graphic"],
        cover: "images/pizza39/pizza39-single-meal.jpeg",
        info: { zh: "品牌 / 角色 / 包裝", ko: "브랜딩 / 캐릭터 / 패키지", en: "Branding / Character / Package" },
        images: [
          "images/pizza39/pizza39-single-meal.jpeg",
          "images/pizza39/pizza39-boxes.jpeg",
          "images/pizza39/pizza39-full-menu.jpeg",
          "images/pizza39/pizza39-poster-set.png",
          "images/pizza39/pizza39-poster-wall.png"
        ]
      },
      {
        title: "Open the Kitchen",
        categories: ["package", "graphic"],
        cover: "images/brand/openkitchen-package.png",
        info: { zh: "包裝 / 海報 / 商品視覺", ko: "패키지 / 포스터 / 제품 비주얼", en: "Package / Poster / Product Visual" },
        images: ["images/brand/openkitchen-package.png", "images/brand/open-the-kitchen.png", "images/brand/openkitchen-poster.png", "images/brand/openkitchen-jar-set.png", "images/brand/openkitchen-giftbox.png"]
      },
      {
        title: "Byway Bakers",
        categories: ["branding", "package"],
        cover: "images/brand/byway-bakers.png",
        info: { zh: "品牌 / 烘焙 / 咖啡", ko: "브랜딩 / 베이커리 / 카페", en: "Branding / Bakery / Cafe" },
        images: ["images/brand/byway-bakers.png", "images/brand/byway-paperbag.png", "images/brand/byway-financier-box.png", "images/brand/byway-cup-red.png", "images/brand/byway-cup-white.png"]
      },
      {
        title: "Poster Series",
        categories: ["graphic"],
        cover: "images/poster/asobi-poster-series.jpeg",
        info: { zh: "平面設計 / 海報 / 合成", ko: "그래픽 디자인 / 포스터 / 합성", en: "Graphic Design / Poster / Composite" },
        images: ["images/poster/asobi-poster-series.jpeg"]
      },
      {
        title: "Photography Series",
        categories: ["graphic"],
        cover: "images/photo/strawberry-ade.png",
        info: { zh: "攝影 / 飲品 / 修圖", ko: "촬영 / 음료 / 보정", en: "Photography / Beverage / Retouching" },
        images: ["images/photo/strawberry-ade.png", "images/photo/passionfruit-ade.png", "images/photo/green-grape-ade.png"]
      }
    ];

    const dict = {
      zh: { about_title: "作品先說話，說明放後面。", about_p1: "你好，我是 Yen Sunny，來自台灣，目前在首爾工作的平面設計師。擅長品牌識別、包裝、海報、商品攝影與修圖，並能將視覺概念整理成可實際使用的設計成果。", about_p2: "我有 13 年平面設計經驗，在台灣出生、於韓國工作。我的強項是用外國人的視角觀察韓國市場，同時保留設計在商業現場中可被理解、可被使用的清楚度。", fact_exp: "資歷", fact_exp_value: "13 年", fact_base: "所在地", fact_from: "來自", fact_tools: "工具", footer: "© 2026 Yen Sunny. 作品圖片、網站製作與整理過程含 AI 輔助。", viewer_close: "關閉", viewer_prev: "上一張", viewer_next: "下一張" },
      ko: { about_title: "작업을 먼저 보여주고, 설명은 그 다음에.", about_p1: "안녕하세요. 저는 대만 출신으로 서울에서 일하는 그래픽 디자이너 Yen Sunny입니다. 브랜드 아이덴티티, 패키지, 포스터, 제품 촬영과 보정을 중심으로 시각물을 실제로 활용 가능한 결과물로 정리합니다.", about_p2: "13년 차 그래픽 디자이너입니다. 대만에서 태어나 한국에서 일하며, 외국인의 시선과 현지 시장 감각을 함께 사용해 명확하고 기억에 남는 디자인을 만드는 것을 중요하게 생각합니다.", fact_exp: "경력", fact_exp_value: "13년", fact_base: "활동 지역", fact_from: "출신", fact_tools: "툴", footer: "© 2026 Yen Sunny. 포트폴리오 이미지, 웹사이트 제작 및 정리 과정에는 AI 보조 작업이 포함되어 있습니다.", viewer_close: "닫기", viewer_prev: "이전", viewer_next: "다음" },
      en: { about_title: "Clear work first. Explanation second.", about_p1: "Hi, I’m Yen Sunny, a Taiwan-born graphic designer based in Seoul. I work across brand identity, packaging, posters, product photography, and retouching, shaping visual ideas into practical design outcomes.", about_p2: "With 13 years of experience, I bring both an outsider’s perspective and a working understanding of the Korean market, creating design that is clear, usable, and memorable.", fact_exp: "Experience", fact_exp_value: "13 years", fact_base: "Base", fact_from: "From", fact_tools: "Tools", footer: "© 2026 Yen Sunny. Portfolio images, website production, and editing include AI-assisted support.", viewer_close: "Close", viewer_prev: "Prev", viewer_next: "Next" }
    };

    const pages = { work: document.querySelector("#workPage"), about: document.querySelector("#aboutPage") };
    const workList = document.querySelector("#workList");
    const pageButtons = document.querySelectorAll(".page-button");
    const filterButtons = document.querySelectorAll(".filter");
    const langButtons = document.querySelectorAll(".lang-button");
    const viewer = document.querySelector("#viewer");
    const viewerTitle = document.querySelector("#viewerTitle");
    const viewerImage = document.querySelector("#viewerImage");
    const imageCount = document.querySelector("#imageCount");
    const closeViewer = document.querySelector("#closeViewer");
    const prevImage = document.querySelector("#prevImage");
    const nextImage = document.querySelector("#nextImage");
    let currentWork = null;
    let currentIndex = 0;
    let currentLang = "zh";

    function renderWorks() {
      workList.innerHTML = works.map((work, index) => `
        <article class="work ${index === 0 ? "is-featured" : ""}" tabindex="0" data-index="${index}">
          <img src="${work.cover}" alt="${work.title}" loading="${index === 0 ? "eager" : "lazy"}">
          <div class="label"><strong>${work.title}</strong><span>${work.info[currentLang]}</span></div>
        </article>
      `).join("");
      document.querySelectorAll(".work").forEach(item => {
        const work = works[Number(item.dataset.index)];
        item.addEventListener("click", () => openViewer(work));
        item.addEventListener("keydown", event => { if (event.key === "Enter") openViewer(work); });
      });
    }
    function showPage(name) {
      Object.entries(pages).forEach(([key, page]) => page.classList.toggle("is-active", key === name));
      pageButtons.forEach(button => button.classList.toggle("is-active", button.dataset.page === name));
      filterButtons.forEach(button => button.classList.remove("is-active"));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function filterWorks(filter) {
      Object.entries(pages).forEach(([key, page]) => page.classList.toggle("is-active", key === "work"));
      pageButtons.forEach(button => button.classList.remove("is-active"));
      filterButtons.forEach(button => button.classList.toggle("is-active", button.dataset.filter === filter));
      document.querySelectorAll(".work").forEach(item => {
        const work = works[Number(item.dataset.index)];
        item.classList.toggle("is-hidden", !work.categories.includes(filter));
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function resetWorks() {
      Object.entries(pages).forEach(([key, page]) => page.classList.toggle("is-active", key === "work"));
      pageButtons.forEach(button => button.classList.remove("is-active"));
      filterButtons.forEach(button => button.classList.remove("is-active"));
      document.querySelectorAll(".work").forEach(item => item.classList.remove("is-hidden"));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function setLang(lang) {
      currentLang = lang;
      const d = dict[lang];
      document.documentElement.lang = lang === "zh" ? "zh-Hant" : lang;
      document.querySelectorAll("[data-i]").forEach(el => { const key = el.dataset.i; if (d[key]) el.textContent = d[key]; });
      document.querySelectorAll(".work").forEach(item => {
        const work = works[Number(item.dataset.index)];
        const text = item.querySelector(".label span");
        if (text) text.textContent = work.info[lang];
      });
      langButtons.forEach(button => button.classList.toggle("is-active", button.dataset.lang === lang));
      if (viewer.classList.contains("is-open")) updateViewerTitle();
    }
    function updateViewerTitle() {
      if (currentWork) viewerTitle.innerHTML = `${currentWork.title}<small>${currentWork.info[currentLang]}</small>`;
    }
    function openViewer(work) {
      currentWork = work;
      currentIndex = 0;
      updateViewerTitle();
      viewer.classList.add("is-open");
      viewer.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      showCurrentImage();
    }
    function showCurrentImage() {
      viewerImage.src = currentWork.images[currentIndex];
      viewerImage.alt = `${currentWork.title} ${currentIndex + 1}`;
      imageCount.textContent = `${currentIndex + 1} / ${currentWork.images.length}`;
      prevImage.style.visibility = currentWork.images.length > 1 ? "visible" : "hidden";
      nextImage.style.visibility = currentWork.images.length > 1 ? "visible" : "hidden";
    }
    function moveImage(step) { currentIndex = (currentIndex + step + currentWork.images.length) % currentWork.images.length; showCurrentImage(); }
    function closeModal() { viewer.classList.remove("is-open"); viewer.setAttribute("aria-hidden", "true"); document.body.style.overflow = ""; }

    document.querySelector("[data-reset]").addEventListener("click", event => { event.preventDefault(); resetWorks(); });
    pageButtons.forEach(button => button.addEventListener("click", () => showPage(button.dataset.page)));
    filterButtons.forEach(button => button.addEventListener("click", () => filterWorks(button.dataset.filter)));
    langButtons.forEach(button => button.addEventListener("click", () => setLang(button.dataset.lang)));
    closeViewer.addEventListener("click", closeModal);
    prevImage.addEventListener("click", () => moveImage(-1));
    nextImage.addEventListener("click", () => moveImage(1));
    viewer.addEventListener("click", event => { if (event.target === viewer) closeModal(); });
    document.addEventListener("keydown", event => {
      if (!viewer.classList.contains("is-open")) return;
      if (event.key === "Escape") closeModal();
      if (event.key === "ArrowLeft") moveImage(-1);
      if (event.key === "ArrowRight") moveImage(1);
    });

    renderWorks();
    setLang("zh");
  </script>
</body>
</html>
